services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: image-cropper-backend
    ports:
      - "8010:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: image-cropper-frontend
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
